<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <div class="d-flex justify-content-center align-items-center vh-100 bg-light">
        <div class="p-3 bg-white shadow rounded-5 ">
            <div class="card border border-0" style="width: 450px; ">
                <img src="/Smart_Bill/logo1.png" class="card-img-top p-3" style="border-bottom: 1.5px solid black;"
                    alt="..." />
                <div class="card-body p-4">
                    <form>
                        <div class="row g-3 mb-3 align-items-center">
                            <div class="col-5">
                                <label for="" class="col-form-label">Product Name</label>
                            </div>
                            <div class="col-7">
                                <input type="text" id="" placeholder="Product Name" class="form-control" disabled>
                            </div>
                        </div>
                        <div class="row g-3  mb-3 align-items-center">
                            <div class="col-5">
                                <label for="" class="col-form-label">Product Code</label>
                            </div>
                            <div class="col-7">
                                <input type="text" id="" placeholder="Product Code" class="form-control" disabled>
                            </div>
                        </div>
                        <div class="row g-3 mb-3 align-items-center">
                            <div class="col-5">
                                <label for="" class="col-form-label">Product Quantity</label>
                            </div>
                            <div class="col-7">
                                <input type="text" id="" placeholder="Product Quantity" class="form-control">
                            </div>
                        </div>
                        <div class="row g-3 mb-3 align-items-center">
                            <div class="col-5">
                                <label for="" class="col-form-label">Price Without GST</label>
                            </div>
                            <div class="col-7">
                                <input type="text" id="" placeholder="Price Without GST" class="form-control">
                            </div>
                        </div>
                        <div class="row g-3 mb-3 align-items-center">
                            <div class="col-5">
                                <label for="" class="col-form-label">Product GST</label>
                            </div>
                            <div class="col-7">
                                <input type="text" id="" placeholder="Product GST" class="form-control">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-outline-success btn-l mb-1 mt-3"
                            style="width: 100%;">Update</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
