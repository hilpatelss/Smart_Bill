<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>
    <div class="d-flex  p-5 justify-content-center align-middle vh-100 bg-light">
        <div class="table-responsive p-4 shadow rounded-5 border" style="width: 90%;">  
            <table class="table table-striped table-hover table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Product Name</th>
                        <th scope="col">Product Code</th>
                        <th scope="col">Product Quantity</th>
                        <th scope="col">Price Without GST</th>
                        <th scope="col">GST</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th scope="row">1</th>
                        <td>{{ bill.title }}</td>
                        <td>${{ bill.amount }}</td>
                        <td>{{ bill.created_at|date:"M d, Y" }}</td>
                        <td>{{ bill.created_at| d, Y" }}</td>
                        <td>{{ bill.created_at|date:"M d, Y" }}</td>
                        <td>
                            <a href="#" class="btn btn-sm btn-primary" style="width: 48%;">Edit</a>
                            <a href="#" class="btn btn-sm btn-danger" style="width: 48%;">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
