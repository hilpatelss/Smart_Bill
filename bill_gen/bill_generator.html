{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Bill Generator</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Google Fonts: Syne + DM Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

  <style>
    /* ── Design tokens ───────────────────────────────── */
    :root {
      --ink:      #0b0f1a;
      --paper:    #f5f2eb;
      --cream:    #ede9df;
      --accent:   #c84b31;       /* terracotta red */
      --accent-lt:#f4ddd7;
      --gold:     #c9962a;
      --border:   #d4cfc4;
      --mono:     'DM Mono', monospace;
      --sans:     'Syne', sans-serif;
      --radius:   6px;
      --shadow:   0 2px 18px rgba(11,15,26,.08);
    }

    /* ── Base ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: .95rem;
      min-height: 100vh;
    }

    /* ── Masthead ─────────────────────────────────────── */
    .masthead {
      background: var(--ink);
      color: #fff;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 3px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .masthead .brand {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -.5px;
      color: #fff;
      text-decoration: none;
    }
    .masthead .brand span { color: var(--accent); }
    .masthead .badge-env {
      font-family: var(--mono);
      font-size: .65rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: .5px;
    }

    /* ── Layout wrapper ──────────────────────────────── */
    .page-wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 2rem 1.25rem 5rem;
    }

    /* ── Section card ────────────────────────────────── */
    .card-section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .card-section .section-head {
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: .65rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .55rem;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--ink);
    }
    .card-section .section-head i { color: var(--accent); font-size: 1rem; }
    .card-section .section-body { padding: 1.25rem; }

    /* ── Customer strip ──────────────────────────────── */
    #customer-info-strip {
      display: none;
      background: var(--accent-lt);
      border: 1px solid #e2b8ae;
      border-radius: var(--radius);
      padding: .6rem 1rem;
      font-size: .85rem;
      margin-top: .75rem;
    }
    #customer-info-strip.show { display: flex; align-items: center; gap: .75rem; }

    /* ── Form controls ───────────────────────────────── */
    .form-control, .form-select {
      font-family: var(--mono);
      font-size: .85rem;
      border-color: var(--border);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,75,49,.12);
    }
    .form-control[readonly] {
      background: var(--cream);
      color: #555;
    }
    label.form-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: .3rem;
    }

    /* ── Products table ──────────────────────────────── */
    .products-table-wrap { overflow-x: auto; }
    #products-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: .85rem;
    }
    #products-table thead th {
      background: var(--ink);
      color: #fff;
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .6px;
      text-transform: uppercase;
      padding: .6rem .75rem;
      border: none;
      white-space: nowrap;
    }
    #products-table thead th:first-child { border-radius: 4px 0 0 4px; }
    #products-table thead th:last-child  { border-radius: 0 4px 4px 0; }
    #products-table tbody tr {
      transition: background .15s;
      animation: rowSlideIn .22s ease-out;
    }
    @keyframes rowSlideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #products-table tbody tr:hover { background: var(--cream); }
    #products-table tbody td {
      padding: .5rem .6rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    #products-table tbody tr:last-child td { border-bottom: none; }

    .row-num {
      font-family: var(--mono);
      font-weight: 500;
      color: #aaa;
      font-size: .8rem;
      text-align: center;
      width: 36px;
    }
    td.col-code  { min-width: 130px; }
    td.col-name  { min-width: 160px; }
    td.col-price { width: 110px; }
    td.col-qty   { width: 90px; }
    td.col-total { width: 120px; }
    td.col-act   { width: 58px; text-align: center; }

    .input-code {
      font-family: var(--mono);
      font-weight: 500;
      letter-spacing: .5px;
    }
    .input-code.is-invalid { border-color: var(--accent); animation: shake .3s; }
    .input-code.is-valid   { border-color: #198754; }
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      25%    { transform: translateX(-4px); }
      75%    { transform: translateX(4px); }
    }

    .field-name  { font-weight: 500; color: #333; }
    .field-price { font-family: var(--mono); color: #555; text-align: right; }
    .field-total {
      font-family: var(--mono);
      font-weight: 700;
      color: var(--ink);
      text-align: right;
    }
    .field-total.updated {
      animation: flash .4s;
    }
    @keyframes flash {
      0%,100%{ background: transparent; }
      40%    { background: #fffacd; }
    }

    .qty-input { text-align: center; font-family: var(--mono); }

    /* Remove btn */
    .btn-remove {
      background: none;
      border: 1px solid transparent;
      color: #aaa;
      border-radius: var(--radius);
      padding: 2px 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: color .15s, border-color .15s, background .15s;
    }
    .btn-remove:hover { color: var(--accent); border-color: var(--accent-lt); background: var(--accent-lt); }

    /* Loading spinner in code cell */
    .spinner-code {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .code-cell-wrap { position: relative; }

    /* ── Totals ──────────────────────────────────────── */
    .totals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    .total-box {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .85rem 1rem;
      background: var(--cream);
      position: relative;
      overflow: hidden;
    }
    .total-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--border);
    }
    .total-box.highlight::before { background: var(--accent); }
    .total-box label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #888;
      margin-bottom: .3rem;
    }
    .total-box .amount {
      font-family: var(--mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
    }
    .total-box.highlight .amount { color: var(--accent); font-size: 1.5rem; }
    .total-box .gst-note {
      font-family: var(--mono);
      font-size: .68rem;
      color: #999;
      margin-top: 2px;
    }
    .total-box .amount.pop {
      animation: popNum .35s ease-out;
    }
    @keyframes popNum {
      0%  { transform: scale(1); }
      50% { transform: scale(1.07); color: var(--gold); }
      100%{ transform: scale(1); }
    }

    /* ── Action bar ──────────────────────────────────── */
    .action-bar {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn-add-row {
      font-family: var(--mono);
      font-size: .8rem;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: .5rem 1rem;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-add-row:hover { background: #1e2436; transform: translateY(-1px); }
    .btn-add-row:active { transform: translateY(0); }

    .btn-generate {
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: .55rem 1.75rem;
      cursor: pointer;
      letter-spacing: .2px;
      transition: background .15s, transform .12s, box-shadow .15s;
      box-shadow: 0 3px 12px rgba(200,75,49,.3);
    }
    .btn-generate:hover {
      background: #b03a25;
      transform: translateY(-2px);
      box-shadow: 0 5px 18px rgba(200,75,49,.35);
    }
    .btn-generate:disabled {
      background: #ccc;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Toast ───────────────────────────────────────── */
    .toast-stack {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column-reverse;
      gap: .5rem;
    }
    .toast-pill {
      background: var(--ink);
      color: #fff;
      padding: .6rem 1rem;
      border-radius: 99px;
      font-size: .82rem;
      font-family: var(--mono);
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      display: flex;
      align-items: center;
      gap: .5rem;
      animation: toastIn .25s ease-out;
      max-width: 340px;
    }
    .toast-pill.success i { color: #4caf50; }
    .toast-pill.error   i { color: var(--accent); }
    .toast-pill.info    i { color: var(--gold); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Empty state ─────────────────────────────────── */
    #empty-row td {
      text-align: center;
      color: #bbb;
      font-size: .82rem;
      font-family: var(--mono);
      padding: 2rem;
      background: var(--cream);
    }

    /* ── Responsive tweaks ───────────────────────────── */
    @media (max-width: 600px) {
      .masthead { padding: .9rem 1rem; }
      .totals-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Page ──────────────────────────────────────────── -->
<div class="page-wrap">

  <!-- ── Customer Section ─────────────────────────────── -->
  <div class="card-section">
    <div class="section-head">
      <i class="bi bi-person-badge"></i>
      Customer Details
    </div>
    <div class="section-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label" for="customer-number">Customer Number</label>
          <div class="input-group">
            <input type="text" id="customer-number" class="form-control"
                   placeholder="e.g. CUST-001" autocomplete="off"
                   style="font-family:var(--mono);font-weight:500;letter-spacing:.5px" />
            <button class="btn btn-outline-secondary" type="button" id="btn-lookup-customer"
                    title="Look up customer">
              <i class="bi bi-search"></i>
            </button>
          </div>
          
        </div>
        <div class="col-md-4">
          <label class="form-label" for="field-cust-name">Name</label>
          <input type="text" id="field-cust-name" class="form-control" readonly placeholder="—" />
        </div>
        <div class="col-md-4">
          <label class="form-label" for="field-cust-email">Email</label>
          <input type="text" id="field-cust-email" class="form-control" readonly placeholder="—" />
        </div>
      </div>
      <div id="customer-info-strip">
        <i class="bi bi-check-circle-fill text-success"></i>
        <span id="customer-strip-text" style="font-family:var(--mono)"></span>
      </div>
    </div>
  </div><!-- /customer section -->

  <!-- ── Products Section ─────────────────────────────── -->
  <div class="card-section">
    <div class="section-head">
      <i class="bi bi-table"></i>
      Bill Items
      <span class="ms-auto" id="item-count-badge"
            style="font-family:var(--mono);font-weight:400;color:#aaa;text-transform:none;letter-spacing:0">
        0 item(s)
      </span>
    </div>
    <div class="section-body pb-2">
      <div class="products-table-wrap">
        <table id="products-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Product Code</th>
              <th>Product Name</th>
              <th style="text-align:right">Unit Price (₹)</th>
              <th style="text-align:center">Qty</th>
              <th style="text-align:right">Row Total (₹)</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="bill-items-body">
            <!-- Empty state placeholder -->
            <tr id="empty-row">
              <td colspan="7">
                <i class="bi bi-inbox" style="font-size:1.5rem;display:block;margin-bottom:.4rem"></i>
                No items added yet. Click "Add New Row" to begin.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Row actions -->
      <div class="action-bar mt-3">
        <button class="btn-add-row" id="btn-add-row" type="button">
          <i class="bi bi-plus-lg me-1"></i> Add New Row
        </button>
        <span style="font-family:var(--mono);font-size:.72rem;color:#aaa">
          Tab through Product Code → Quantity for fast entry
        </span>
      </div>
    </div>
  </div><!-- /products section -->

  <!-- ── Totals Section ───────────────────────────────── -->
  <div class="card-section">
    <div class="section-head">
      <i class="bi bi-calculator"></i>
      Bill Summary
    </div>
    <div class="section-body">
      <div class="totals-grid">
        <div class="total-box">
          <label>Subtotal</label>
          <div class="amount" id="disp-subtotal">₹ 0.00</div>
        </div>
        <div class="total-box">
          <label>GST <span style="font-weight:400;color:#aaa">(18%)</span></label>
          <div class="amount" id="disp-gst">₹ 0.00</div>
          <div class="gst-note" id="disp-gst-note"></div>
        </div>
        <div class="total-box highlight">
          <label>Total Amount</label>
          <div class="amount" id="disp-total">₹ 0.00</div>
        </div>
      </div>
    </div>
  </div><!-- /totals -->

  <!-- ── Generate button ──────────────────────────────── -->
  <div class="d-flex justify-content-end gap-3 align-items-center">
    <span style="font-family:var(--mono);font-size:.78rem;color:#999" id="bill-status-text"></span>
    <button class="btn-generate" id="btn-generate" type="button">
      <i class="bi bi-receipt me-1"></i> Generate Bill
    </button>
  </div>

</div><!-- /page-wrap -->

<!-- ── Toast container ──────────────────────────────── -->
<div class="toast-stack" id="toast-stack"></div>

<!-- Bootstrap JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFvbL4+z5QkFMlKhGMHbgNR2Nz"
        crossorigin="anonymous"></script>

<script>
/* ============================================================
   Smart Bill Generator — Vanilla JS / Fetch API
   ============================================================ */

const URLS = {
  productLookup  : (code)  => `/billing/api/product/${encodeURIComponent(code)}/`,
  customerLookup : (num)   => `/billing/api/customer/${encodeURIComponent(num)}/`,
  generateBill   : `/billing/api/generate/`,
};

const GST_RATE = 0.18;

/* ── CSRF helper ─────────────────────────────────────── */
function getCsrfToken() {
  const cookie = document.cookie.split(';')
    .find(c => c.trim().startsWith('csrftoken='));
  return cookie ? cookie.split('=')[1].trim() : '';
}

/* ── Toast helper ────────────────────────────────────── */
function showToast(message, type = 'info', duration = 3500) {
  const icons = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', info: 'bi-info-circle-fill' };
  const stack = document.getElementById('toast-stack');
  const pill = document.createElement('div');
  pill.className = `toast-pill ${type}`;
  pill.innerHTML = `<i class="bi ${icons[type] || icons.info}"></i><span>${message}</span>`;
  stack.appendChild(pill);
  setTimeout(() => { pill.style.opacity = '0'; pill.style.transition = 'opacity .3s'; setTimeout(() => pill.remove(), 310); }, duration);
}

/* ── Currency format ─────────────────────────────────── */
const fmt = (n) => '₹ ' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

/* ── Row counter ─────────────────────────────────────── */
let rowSeq = 0;
const getNextSeq = () => ++rowSeq;

/* ── Empty-row visibility ─────────────────────────────── */
function refreshEmptyState() {
  const body     = document.getElementById('bill-items-body');
  const rows     = body.querySelectorAll('tr.bill-row');
  const emptyRow = document.getElementById('empty-row');
  emptyRow.style.display = rows.length ? 'none' : '';
  document.getElementById('item-count-badge').textContent =
    `${rows.length} item${rows.length !== 1 ? 's' : ''}`;
}

/* ── Grand total recalculation ────────────────────────── */
function recalcTotals() {
  let subtotal = 0;
  document.querySelectorAll('.row-total-val').forEach(cell => {
    subtotal += parseFloat(cell.dataset.value || 0);
  });
  const gst   = subtotal * GST_RATE;
  const total = subtotal + gst;

  const setAnim = (id, text) => {
    const el = document.getElementById(id);
    el.textContent = text;
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  };
  setAnim('disp-subtotal', fmt(subtotal));
  setAnim('disp-gst',      fmt(gst));
  setAnim('disp-total',    fmt(total));

  document.getElementById('disp-gst-note').textContent =
    subtotal > 0 ? `18% of ${fmt(subtotal)}` : '';
}

/* ── Row total update ────────────────────────────────── */
function updateRowTotal(row) {
  const price    = parseFloat(row.querySelector('.field-price').dataset.price || 0);
  const qty      = parseInt(row.querySelector('.qty-input').value, 10) || 0;
  const total    = price * qty;
  const totalEl  = row.querySelector('.field-total');
  totalEl.textContent       = fmt(total);
  totalEl.dataset.value     = total;
  // mirror on hidden data holder
  const holder = row.querySelector('.row-total-val');
  holder.dataset.value = total;
  totalEl.classList.remove('updated'); void totalEl.offsetWidth; totalEl.classList.add('updated');
  recalcTotals();
}

/* ── Product code fetch ───────────────────────────────── */
async function fetchProduct(row, code) {
  if (!code) return;
  const spinner    = row.querySelector('.spinner-code');
  const codeInput  = row.querySelector('.input-code');
  const nameField  = row.querySelector('.field-name');
  const priceField = row.querySelector('.field-price');

  spinner.style.display = 'block';
  codeInput.classList.remove('is-valid', 'is-invalid');

  try {
    const res  = await fetch(URLS.productLookup(code));
    const data = await res.json();

    if (data.status === 'ok') {
      nameField.textContent           = data.name;
      priceField.textContent          = fmt(data.unit_price);
      priceField.dataset.price        = data.unit_price;
      codeInput.value                 = data.product_code;  // normalize casing
      codeInput.classList.add('is-valid');
      updateRowTotal(row);
      showToast(`${data.product_code} — ${data.name} loaded`, 'success', 2200);
      // Auto-focus quantity
      row.querySelector('.qty-input').focus();
    } else {
      nameField.textContent    = '—';
      priceField.textContent   = '—';
      priceField.dataset.price = 0;
      codeInput.classList.add('is-invalid');
      showToast(data.message || 'Product not found', 'error');
      recalcTotals();
    }
  } catch (err) {
    showToast('Network error fetching product', 'error');
  } finally {
    spinner.style.display = 'none';
  }
}

/* ── Add row ──────────────────────────────────────────── */
function addRow() {
  const body = document.getElementById('bill-items-body');
  const num  = getNextSeq();
  const tr   = document.createElement('tr');
  tr.className = 'bill-row';
  tr.dataset.seq = num;

  tr.innerHTML = `
    <td class="row-num col-num">${num}</td>
    <td class="col-code">
      <div class="code-cell-wrap">
        <input type="text" class="form-control input-code"
               placeholder="e.g. P001"
               autocomplete="off"
               style="padding-right:30px" />
        <div class="spinner-code"></div>
      </div>
    </td>
    <td class="col-name"><span class="field-name" style="color:#bbb">—</span></td>
    <td class="col-price">
      <span class="field-price" data-price="0" style="color:#bbb;font-family:var(--mono);font-size:.85rem;float:right">—</span>
    </td>
    <td class="col-qty">
      <input type="number" class="form-control qty-input" value="1" min="1" step="1" />
    </td>
    <td class="col-total">
      <span class="field-total row-total-val" data-value="0"
            style="font-family:var(--mono);font-weight:700;float:right">₹ 0.00</span>
    </td>
    <td class="col-act">
      <button class="btn-remove" title="Remove row">
        <i class="bi bi-trash3"></i>
      </button>
    </td>
  `;

  body.appendChild(tr);
  refreshEmptyState();

  /* ── Event: product code blur / enter ── */
  const codeInput = tr.querySelector('.input-code');
  const doFetch   = () => {
    const code = codeInput.value.trim();
    if (code) fetchProduct(tr, code);
  };
  codeInput.addEventListener('blur', doFetch);
  codeInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doFetch(); }
  });

  /* ── Event: quantity change ── */
  tr.querySelector('.qty-input').addEventListener('input', () => updateRowTotal(tr));

  /* ── Event: remove ── */
  tr.querySelector('.btn-remove').addEventListener('click', () => {
    tr.style.transition = 'opacity .2s, transform .2s';
    tr.style.opacity    = '0';
    tr.style.transform  = 'translateX(12px)';
    setTimeout(() => {
      tr.remove();
      refreshEmptyState();
      recalcTotals();
      // Re-number remaining rows
      document.querySelectorAll('#bill-items-body .bill-row').forEach((r, i) => {
        r.querySelector('.row-num').textContent = i + 1;
      });
    }, 220);
  });

  /* Auto-focus the code input */
  codeInput.focus();
}

/* ── Customer lookup ──────────────────────────────────── */
async function lookupCustomer() {
  const num = document.getElementById('customer-number').value.trim();
  if (!num) { showToast('Enter a customer number first', 'info'); return; }

  try {
    const res  = await fetch(URLS.customerLookup(num));
    const data = await res.json();
    const strip = document.getElementById('customer-info-strip');

    if (data.status === 'ok') {
      document.getElementById('field-cust-name').value  = data.name  || '—';
      document.getElementById('field-cust-email').value = data.email || '—';
      document.getElementById('customer-strip-text').textContent =
        `Verified: ${data.customer_number}${data.name ? ' — ' + data.name : ''}`;
      strip.classList.add('show');
      showToast(`Customer ${data.customer_number} verified`, 'success');
    } else {
      document.getElementById('field-cust-name').value  = '';
      document.getElementById('field-cust-email').value = '';
      strip.classList.remove('show');
      showToast(data.message || 'Customer not found', 'error');
    }
  } catch {
    showToast('Network error looking up customer', 'error');
  }
}

/* ── Generate Bill ────────────────────────────────────── */
async function generateBill() {
  const btn = document.getElementById('btn-generate');
  const statusText = document.getElementById('bill-status-text');

  const customerNumber = document.getElementById('customer-number').value.trim();
  if (!customerNumber) { showToast('Customer number is required', 'error'); return; }

  const rows = document.querySelectorAll('#bill-items-body .bill-row');
  if (rows.length === 0) { showToast('Add at least one product', 'error'); return; }

  const items = [];
  let valid = true;
  rows.forEach((row, i) => {
    const code = row.querySelector('.input-code').value.trim();
    const qty  = parseInt(row.querySelector('.qty-input').value, 10);
    if (!code) {
      showToast(`Row ${i + 1}: product code is empty`, 'error');
      valid = false; return;
    }
    if (!qty || qty < 1) {
      showToast(`Row ${i + 1}: invalid quantity`, 'error');
      valid = false; return;
    }
    items.push({ product_code: code, quantity: qty });
  });
  if (!valid) return;

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Generating…`;
  statusText.textContent = '';

  try {
    const res  = await fetch(URLS.generateBill, {
      method : 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken' : getCsrfToken(),
      },
      body: JSON.stringify({ customer_number: customerNumber, items }),
    });
    const data = await res.json();

    if (data.status === 'ok') {
      showToast(`Bill ${data.bill_number} created! Total: ${fmt(data.total_amount)}`, 'success', 5000);
      statusText.textContent = `✓ ${data.bill_number} generated`;
      // Redirect to receipt after a short delay
      setTimeout(() => { window.location.href = data.redirect_url; }, 2000);
    } else {
      showToast(data.message || 'Failed to generate bill', 'error');
      btn.disabled = false;
      btn.innerHTML = `<i class="bi bi-receipt me-1"></i> Generate Bill`;
    }
  } catch {
    showToast('Network error — please try again', 'error');
    btn.disabled = false;
    btn.innerHTML = `<i class="bi bi-receipt me-1"></i> Generate Bill`;
  }
}

/* ── Boot ─────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btn-add-row').addEventListener('click', addRow);
  document.getElementById('btn-generate').addEventListener('click', generateBill);

  const custInput = document.getElementById('customer-number');
  const btnLookup = document.getElementById('btn-lookup-customer');
  btnLookup.addEventListener('click', lookupCustomer);
  custInput.addEventListener('keydown', e => { if (e.key === 'Enter') lookupCustomer(); });

  refreshEmptyState();

  // Add one row automatically on load
  addRow();
});
</script>
</body>
</html>
