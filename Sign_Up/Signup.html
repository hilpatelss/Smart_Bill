<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <div class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="p-3 bg-white shadow rounded-5 ">
      <div class="card border border-0" style="width: 450px; ">
        <img src="/Smart_Bill/logo1.png" class="card-img-top p-3" style="border-bottom: 1.5px solid black;" alt="..." />
        <div class="card-body p-4">
          <form>
            <div class="row mb-3">
              <div class="col">
                <input type="text" class="form-control" placeholder="Company Name" id="inputEmail3">
              </div>
            </div>
            <div class="mb-4">
              <label for="exampleFormControlInput1" class="form-label">Company Logo:</label>
              <input type="file" class="form-control" id="inputGroupFile02">
            </div>
            <div class="row mb-4">
              <div class="col">
                <input type="email" class="form-control" placeholder="Email" id="inputEmail3">
              </div>
            </div>
            <div class="row mb-4">
              <div class="col">
                <input type="password" class="form-control" placeholder="Password" id="inputPassword3">
              </div>
            </div>
            <button type="submit" class="btn btn-outline-success btn-l mb-1 mt-3" style="width: 100%;">Sign Up</button>
            <div class="row m-1">
              <div class="col text-center">
                OR
              </div>
            </div>
            <a href="">
              <button type="button" class="btn btn-outline-secondary btn-l mt-1" style="width: 100%;">Sign In</button>
            </a>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
